<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Tour Guide</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- App CSS -->
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <!-- Presentation Button (Outside phone UI) -->
    <button id="presentation-next-btn" class="presentation-btn" style="display: none;">Next Location ➡</button>

    <!-- Mobile App Wrapper for Desktop Presentation -->
    <div id="app-wrapper">
        <!-- Map Container (Background) -->
        <div id="map-container"></div>
        
        <!-- Top Bar -->
        <header class="top-nav">
            <h1>Gemini Guide</h1>
            <div id="status-indicator" class="status-indicator">
                <span class="pulse-dot"></span>
                <span class="status-text">Locating you...</span>
            </div>
        </header>

        <!-- Bottom Sheet (Streaming Content) -->
        <main class="bottom-sheet" id="chat-sheet">
            <div class="sheet-handle"></div>
            <div class="chat-container" id="chat-container">
                <div class="message system" id="welcome-message">
                    <p>Welcome! Select a featured destination or tap "Start Tour" to generate a live, interactive audio-visual tour of your surroundings powered by Gemini.</p>
                </div>
                
                <!-- Featured Places Carousel -->
                <div class="featured-carousel" id="featured-carousel">
                    <!-- Cards injected via JS -->
                </div>
            </div>
            
            <div class="action-bar">
                <button id="start-tour-btn" class="primary-btn" disabled>Start Walking Tour</button>
            </div>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- App Scripts (Type module for imports) -->
    <script type="module" src="js/places.js"></script>
    <script type="module" src="js/map.js"></script>
    <script type="module" src="js/ui.js"></script>
    <script type="module" src="js/gemini.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
